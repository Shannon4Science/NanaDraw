name: 🐛 Bug Report / 问题报告
description: Report a bug / 报告一个问题
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Please fill in the details below.
        感谢反馈！请填写以下信息。
  - type: textarea
    id: description
    attributes:
      label: Description / 问题描述
      placeholder: A clear description of the bug / 清晰描述问题
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce / 复现步骤
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior / 期望行为
    validations:
      required: false
  - type: textarea
    id: environment
    attributes:
      label: Environment / 环境信息
      placeholder: |
        - OS: [e.g. macOS 15, Ubuntu 24.04]
        - Python: [e.g. 3.12]
        - Node: [e.g. 20]
        - Browser: [e.g. Chrome 120]
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs / 日志
      render: shell
    validations:
      required: false
